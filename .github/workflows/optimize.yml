name: HLS Video Optimizer (Local Self-Hosted)

on:
  repository_dispatch:
    types: [optimize-hls]

jobs:
  optimize:
    name: Process HLS Video (Local)
    runs-on: self-hosted
    
    # Restrict runner permissions to minimum
    permissions:
      contents: read

    steps:
      - name: Checkout worker repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run HLS Optimizer
        env:
          EVENT_PAYLOAD: ${{ toJson(github.event.client_payload) }}
          PRIVATE_REPO_TOKEN: ${{ secrets.PRIVATE_REPO_TOKEN }}
        run: |
          node optimize.js
